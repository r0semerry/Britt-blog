stats:
  heading: "From careful thinking to real-world outcomes: Work that compounds"
  intro: "With every donation, we've been able to reach farther and do more. In just the past 12 months, we've provided resources to over 50 grassroots initiatives, supported 100+ volunteers working on the ground, and directly impacted communities facing real challenges—with real solutions. From mental health support to educational access, you turned ideas into measurable change."
  cards:
    - title: "Years working at the intersection of people + systems"
      number: "8+"
      description: "Over 25,000 people directly supported through community programs, crisis response, and ongoing care initiatives."
      bg_class: "background-color-purple"
      tall: true
      texture_url: "https://cdn.prod.website-files.com/696f263de0ac4c57cc26f67c/696f263ee0ac4c57cc26f6de_pinkish.avif"
      texture_class: "stats_texture is-darken-20"
    - title: "Customer Satisfaction Rating"
      number: "85%"
      description: "of every dollar goes directly to on-the-ground efforts, tools, and services making a difference where it's needed most."
      bg_class: "background-color-lightblue"
      tall: false
      texture_url: "https://cdn.prod.website-files.com/696f263de0ac4c57cc26f67c/696f263ee0ac4c57cc26f6db_purple_blue.avif"
      texture_class: "stats_texture is-darken-40"
    - title: "Volunteer & Project Support"
      number: "120+"
      description: "120+ local volunteers mobilized across 60+ grassroots projects in the past year."
      bg_class: "background-color-vermillion"
      tall: false
      texture_url: "https://cdn.prod.website-files.com/696f263de0ac4c57cc26f67c/696f263ee0ac4c57cc26f6de_pinkish.avif"
