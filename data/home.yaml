empower:
  heading: "The recipe"
  items:
    - title: "Reading"
      first_letter: "R"
      rest: "eading"
      number: "01"
      tab: "tab1"
      card_heading: "Curiousity as practice"
      description: "I read to understand how systems work in real life — who they support, who they overlook, and what assumptions they quietly rely on."
    - title: "Accessibility"
      first_letter: "A"
      rest: "ccessibility"
      number: "02"
      tab: "tab2"
      card_heading: "Who do we involve"
      description: "I’m interested in reducing friction, lowering cognitive load, and designing in ways that make participation feel possible, not overwhelming."
    - title: "Gardening"
      first_letter: "G"
      rest: "ardening"
      number: "03"
      tab: "tab3"
      card_heading: "Shared stewardship"
      description: "Sunlight, water, and nurturance: the basic things that keep plants alive also keep humans alive. Being a steward of the land, and learning through slow seasonal work, keeps me connected to my roots and to my community."
    - title: "Urbanism"
      first_letter: "U"
      rest: "rbanism"
      number: "04"
      tab: "tab4"
      card_heading: "Belonging at scale"
      description: "Cities and communities function best when they’re built with the people inside them, not just optimized around them."

